listener 1883

# ローカル開発・テスト専用の設定。外部ネットワークに公開する環境では使用しないこと。
# 本番環境では allow_anonymous false に変更し、ユーザー/パスワード認証と ACL を設定すること。
# 参考: https://mosquitto.org/man/mosquitto-conf-5.html（Security セクション）
allow_anonymous true

# メッセージの永続化設定（デフォルト: 無効）
# 有効化するタイミング:
#   - ブローカー再起動後もサブスクライバが受け取っていないメッセージを保持したい場合
#   - QoS 1/2 で publish されたメッセージの消失を防ぎたい場合
#   - Retained メッセージを再起動後も維持したい場合
# 注意: docker-compose.yml の volumes に /mosquitto/data/ のマウントが必要
# persistence true
# persistence_location /mosquitto/data/
