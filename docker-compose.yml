version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: db
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 3s
      retries: 20

  mqtt:
    image: eclipse-mosquitto:2
    container_name: mqtt
    ports:
      - "1883:1883"
    volumes:
      - ./mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -p 1883 -t '__health__' -m 'ok'"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    image: migrate/migrate:v4.17.1
    container_name: migrate
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./api/migrations:/migrations:ro
    command: ["-path", "/migrations", "-database", "postgres://app:app@db:5432/app?sslmode=disable", "up"]
    restart: on-failure

  api:
    container_name: api
    build: ./api
    environment:
      APP_ENV: development
      HTTP_PORT: "8080"
      DATABASE_URL: "postgres://app:app@db:5432/app?sslmode=disable"
      CORS_ORIGIN: "http://localhost:3000"
      MQTT_BROKER: "tcp://mqtt:1883"
      MQTT_CLIENT_ID: "api"
      MQTT_TELEMETRY_TOPIC: "iot/+/telemetry"
      MQTT_HEARTBEAT_TOPIC: "iot/+/heartbeat"
      MQTT_CMD_TOPIC_FMT: "iot/%s/cmd"
      MQTT_ACK_TOPIC_FMT: "iot/%s/cmd_ack"
    ports:
      - "8080:8080"
    depends_on:
      mqtt:
        condition: service_healthy
      db:
        condition: service_healthy
      migrate:
        condition: service_started

  web:
    container_name: web
    build:
      context: ./web
      target: base
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_SERVER=http://localhost:8080/api
    tty: true
    volumes:
      - ./web:/workspace:cached
    working_dir: /workspace
    command: ["sh", "-c", "npm install && npm start"]
    depends_on:
      - api
